<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

  <div class="container">
    <div class="login-box">
      <h2>Login</h2>

      <form>
        <div class="input-box">
          <input type="email" required>
          <label>Email</label>
        </div>

        <div class="input-box">
          <input type="password" required>
          <label>Password</label>
        </div>

        <button type="submit">Login</button>

        <p class="register">
          Don't have an account? <a href="creat.html">Register</a>
        </p>
      </form>
    </div>
  </div>


  <script src="js/join.js"></script>
</body>
</html>
